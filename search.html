<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search | JK Enterprises</title>
<meta name="description" content="Search products, brands and buying guides from JK Enterprises.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://harshyii.github.io/jk5/search.html">
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>

<body>

<header id="siteHeader"></header>

<!-- ==========================================================
SEARCH
========================================================== -->

<section class="bg-body-tertiary border-bottom py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8 text-center">

<h1 class="fw-bold mb-2">Search</h1>

<p class="lead text-secondary mb-4">Find products, brands and buying guides.</p>

<form id="searchForm">

<div class="input-group input-group-lg">

<input type="search" id="searchInput" name="q" class="form-control" placeholder="Search..." autocomplete="off">

<button class="btn btn-primary">Search</button>

</div>

</form>

</div>

</div>

</div>

</section>

<!-- ==========================================================
FILTERS
========================================================== -->

<section class="py-3 border-bottom">

<div class="container">

<div class="row g-2">

<div class="col-md-3">
<select id="searchType" class="form-select">
<option value="all">All Results</option>
<option value="products">Products</option>
<option value="brands">Brands</option>
<option value="blogs">Blogs</option>
</select>
</div>

<div class="col-md-3">
<select id="sortResults" class="form-select">
<option value="relevance">Most Relevant</option>
<option value="latest">Newest</option>
<option value="name">Name A-Z</option>
</select>
</div>

<div class="col-md">
<div id="searchSummary" class="small text-secondary d-flex align-items-center h-100">0 Results</div>
</div>

</div>

</div>

</section>

<!-- ==========================================================
RESULTS
========================================================== -->

<main class="container py-4">

<div id="loadingSearch" class="text-center py-5 d-none">
<div class="spinner-border text-primary"></div>
<p class="mt-3 mb-0">Searching...</p>
</div>

<div id="searchResults"></div>

<div id="noResults" class="text-center py-5 d-none">
<h2 class="h3">No Results Found</h2>
<p class="text-secondary">Try another keyword or browse our catalogue.</p>
<a href="products.html" class="btn btn-primary mt-2">Browse Products</a>
</div>

</main>

<!-- ==========================================================
POPULAR SEARCHES
========================================================== -->

<section class="py-5 bg-body-tertiary">

<div class="container">

<h2 class="h4 mb-3">Popular Searches</h2>

<div class="d-flex flex-wrap gap-2">

<a href="?q=angle grinder" class="btn btn-outline-secondary btn-sm">Angle Grinder</a>
<a href="?q=drill machine" class="btn btn-outline-secondary btn-sm">Drill Machine</a>
<a href="?q=solar panel" class="btn btn-outline-secondary btn-sm">Solar Panel</a>
<a href="?q=water pump" class="btn btn-outline-secondary btn-sm">Water Pump</a>

</div>

</div>

</section>

<footer id="siteFooter"></footer>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
