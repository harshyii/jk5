<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>Search | JK Enterprises</title>

<meta
name="description"
content="Search products, brands and blogs from JK Enterprises.">

<meta
name="robots"
content="index,follow">

<link
rel="canonical"
href="https://harshyii.github.io/jk-enterprises/search.html">

<link
rel="stylesheet"
href="assets/css/bootstrap.min.css">

<link
rel="stylesheet"
href="assets/css/app.css">

</head>

<body>

<!-- ==========================================================
HEADER
Already Created
========================================================== -->



<!-- ==========================================================
SEARCH HERO
========================================================== -->

<section class="bg-light border-bottom py-5">

<div class="container text-center">

<h1 class="fw-bold">

Search

</h1>

<p class="lead">

Find Products, Brands and Buying Guides

</p>

</div>

</section>



<!-- ==========================================================
SEARCH BAR
========================================================== -->

<section class="py-4">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="input-group">

<input

type="search"

id="searchInput"

class="form-control form-control-lg"

placeholder="Search products, brands, blogs...">

<button

class="btn btn-primary"

id="searchButton">

Search

</button>

</div>

</div>

</div>

</div>

</section>



<!-- ==========================================================
SEARCH FILTERS
========================================================== -->

<section class="pb-4">

<div class="container">

<div class="row g-3">

<div class="col-md-3">

<select
id="searchType"
class="form-select">

<option value="all">

All Results

</option>

<option value="products">

Products

</option>

<option value="brands">

Brands

</option>

<option value="blogs">

Blogs

</option>

</select>

</div>



<div class="col-md-3">

<select
id="sortResults"
class="form-select">

<option value="relevance">

Most Relevant

</option>

<option value="latest">

Newest

</option>

<option value="name">

Name A-Z

</option>

</select>

</div>

</div>

</div>

</section>



<!-- ==========================================================
SEARCH SUMMARY
========================================================== -->

<section>

<div class="container">

<p>

Showing

<strong id="resultCount">

0

</strong>

Results

</p>

</div>

</section>



<!-- ==========================================================
PRODUCT RESULTS
========================================================== -->

<section class="py-4">

<div class="container">

<h2>

Products

</h2>

<div

id="productResults"

class="row g-4">

<!-- Dynamic -->

</div>

</div>

</section>



<!-- ==========================================================
BRAND RESULTS
========================================================== -->

<section class="py-4 bg-light">

<div class="container">

<h2>

Brands

</h2>

<div

id="brandResults"

class="row g-4">

<!-- Dynamic -->

</div>

</div>

</section>



<!-- ==========================================================
BLOG RESULTS
========================================================== -->

<section class="py-4">

<div class="container">

<h2>

Buying Guides

</h2>

<div

id="blogResults"

class="row g-4">

<!-- Dynamic -->

</div>

</div>

</section>



<!-- ==========================================================
LOADING
========================================================== -->

<section

id="loadingSearch"

class="text-center py-5 d-none">

<div class="spinner-border text-primary">

</div>

<p class="mt-3">

Searching...

</p>

</section>



<!-- ==========================================================
EMPTY
========================================================== -->

<section

id="noResults"

class="text-center py-5 d-none">

<div class="container">

<h2>

No Results Found

</h2>

<p>

Try another keyword.

</p>

</div>

</section>



<!-- ==========================================================
POPULAR SEARCHES
========================================================== -->

<section class="bg-light py-5">

<div class="container">

<h2>

Popular Searches

</h2>

<div class="d-flex flex-wrap gap-2">

<!-- Future Dynamic -->

<a href="?q=angle grinder" class="btn btn-outline-secondary">

Angle Grinder

</a>

<a href="?q=solar panel" class="btn btn-outline-secondary">

Solar Panel

</a>

<a href="?q=drill machine" class="btn btn-outline-secondary">

Drill Machine

</a>

<a href="?q=water pump" class="btn btn-outline-secondary">

Water Pump

</a>

</div>

</div>

</section>

========================================================== -->

src="assets/vendor/bootstrap/bootstrap.bundle.min.js">

<script
type="module"
src="assets/js/search.js">

<script
type="module"
src="assets/js/app.js">

</script>

</body>

</html>
