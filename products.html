<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products | JK Enterprises</title>
<meta name="description" content="Browse Power Tools, Hand Tools, Solar Products, Automotive Care Products and Industrial Equipment from JK Enterprises.">
<meta name="keywords" content="Power Tools, Hand Tools, Solar Products, Industrial Equipment">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://harshyii.github.io/jk5/products.html">
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>

<body>

<header id="siteHeader"></header>

<!-- ==========================================================
PAGE HEADER
========================================================== -->

<section class="py-5 bg-body-tertiary border-bottom">

<div class="container">

<div class="d-flex flex-wrap justify-content-between align-items-center gap-2">

<div>
<h1 class="fw-bold mb-1">Products</h1>
<p class="text-secondary mb-0">Showing <strong id="productCount">0</strong> Products</p>
</div>

<form action="search.html" method="get" class="col-12 col-lg-4">
<input type="search" name="q" id="productSearch" class="form-control form-control-lg" placeholder="Search products..." autocomplete="off">
</form>

</div>

</div>

</section>

<!-- ==========================================================
FILTERS
========================================================== -->

<section class="py-4">

<div class="container">

<div class="row g-3">

<div class="col-6 col-lg-4">
<select id="categoryFilter" class="form-select">
<option value="">All Categories</option>
</select>
</div>

<div class="col-6 col-lg-4">
<select id="brandFilter" class="form-select">
<option value="">All Brands</option>
</select>
</div>

<div class="col-12 col-lg-4">
<select id="sortProducts" class="form-select">
<option value="latest">Newest</option>
<option value="priceLow">Price ↑</option>
<option value="priceHigh">Price ↓</option>
<option value="name">Name A–Z</option>
</select>
</div>

</div>

</div>

</section>

<!-- ==========================================================
PRODUCT GRID
========================================================== -->

<main class="container pb-5">

<div id="productGrid" class="row g-3"></div>

<div class="text-center mt-4">
<button id="loadMoreProducts" class="btn btn-primary d-none">Load More</button>
</div>

</main>

<footer id="siteFooter"></footer>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
