<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>Products | JK Enterprises</title>

<meta
name="description"
content="Browse industrial products including Power Tools, Hand Tools, Solar Products, Automotive Care Products and Accessories from JK Enterprises.">

<meta
name="keywords"
content="Power Tools, Hand Tools, Solar Products, Industrial Equipment, JK Enterprises">

<meta
name="robots"
content="index,follow">

<link
rel="canonical"
href="https://harshyii.github.io/jk-enterprises/products.html">

<!-- Bootstrap -->
<link
rel="stylesheet"
href="assets/css/bootstrap.min.css">

<!-- Main CSS -->
<link
rel="stylesheet"
href="assets/css/app.css">

</head>

<body>

<!-- ==========================================================
HEADER
Already Created
========================================================== -->



<!-- ==========================================================
PAGE HERO
========================================================== -->

<section class="bg-light py-5 border-bottom">

<div class="container">

<h1 class="fw-bold">

Products

</h1>

<p class="text-muted mb-0">

Browse our complete catalogue of industrial products.

</p>

</div>

</section>



<!-- ==========================================================
FILTERS
========================================================== -->

<section class="py-4">

<div class="container">

<div class="row g-3">

<!-- Search -->

<div class="col-lg-4">

<input

type="search"

class="form-control"

id="productSearch"

placeholder="Search products...">

</div>



<!-- Category -->

<div class="col-lg-3">

<select
class="form-select"
id="categoryFilter">

<option value="">

All Categories

</option>

<!--
Categories will load dynamically
-->

</select>

</div>



<!-- Brand -->

<div class="col-lg-3">

<select
class="form-select"
id="brandFilter">

<option value="">

All Brands

</option>

<!--
Brands will load dynamically
-->

</select>

</div>



<!-- Sort -->

<div class="col-lg-2">

<select
class="form-select"
id="sortProducts">

<option value="latest">

Newest

</option>

<option value="priceLow">

Price ↑

</option>

<option value="priceHigh">

Price ↓

</option>

<option value="name">

Name

</option>

</select>

</div>

</div>

</div>

</section>



<!-- ==========================================================
RESULT BAR
========================================================== -->

<section class="pb-3">

<div class="container">

<div class="d-flex
justify-content-between
align-items-center">

<p class="mb-0">

Showing

<strong id="productCount">

0

</strong>

Products

</p>

<div>

<button
class="btn btn-outline-secondary btn-sm">

Grid

</button>

<button
class="btn btn-outline-secondary btn-sm">

List

</button>

</div>

</div>

</div>

</section>



<!-- ==========================================================
PRODUCT GRID
========================================================== -->

<section class="pb-5">

<div class="container">

<div
class="row g-4"

id="productGrid">

<!--

Dynamic Product Cards

-->

</div>

</div>

</section>



<!-- ==========================================================
LOADING
========================================================== -->

<section
id="loadingProducts"
class="py-5 text-center d-none">

<div class="container">

<div
class="spinner-border text-primary">

</div>

<p class="mt-3">

Loading Products...

</p>

</div>

</section>



<!-- ==========================================================
EMPTY STATE
========================================================== -->

<section
id="emptyProducts"
class="py-5 text-center d-none">

<div class="container">

<h3>

No Products Found

</h3>

<p>

Try changing your search or filters.

</p>

</div>

</section>



<!-- ==========================================================
LOAD MORE
========================================================== -->

<section class="pb-5 text-center">

<button

id="loadMoreProducts"

class="btn btn-primary">

Load More

</button>

</section>



<!-- ==========================================================
FOOTER
Already Created
========================================================== -->



<!-- Bootstrap -->

<script
src="assets/vendor/bootstrap/bootstrap.bundle.min.js">
</script>

<!-- Product Page -->

<script
type="module"
src="assets/js/product.js">
</script>

<!-- Common App -->

<script
type="module"
src="assets/js/app.js">
</script>

</body>

</html>
