<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product | JK Enterprises</title>
<meta name="description" content="Industrial products from JK Enterprises.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://harshyii.github.io/jk-enterprises/product.html">
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>

<body>

<header id="siteHeader"></header>

<!-- ==========================================================
BREADCRUMB
========================================================== -->

<nav class="bg-body-tertiary border-bottom py-3">
<div class="container">
<ol class="breadcrumb mb-0">
<li class="breadcrumb-item"><a href="index.html">Home</a></li>
<li class="breadcrumb-item"><a href="products.html">Products</a></li>
<li class="breadcrumb-item active" id="breadcrumbProduct">Loading...</li>
</ol>
</div>
</nav>

<!-- ==========================================================
PRODUCT
========================================================== -->

<main class="container py-5">

<div class="row g-5">

<div class="col-lg-5">
<img id="productImage" src="assets/images/placeholders/no-image.webp" class="img-fluid rounded shadow-sm" alt="Product" loading="lazy">
</div>

<div class="col-lg-7">

<span id="productBrand" class="badge bg-primary">Brand</span>

<h1 id="productName" class="mt-3 mb-1">Loading...</h1>

<p id="productSKU" class="text-secondary small mb-4">SKU</p>

<h2 id="productPrice" class="fw-bold text-primary mb-1">₹0</h2>

<p id="productMRP" class="text-decoration-line-through text-secondary mb-2"></p>

<div id="stockStatus" class="mb-4">In Stock</div>

<p id="shortDescription" class="mb-4">Loading product description...</p>

<div class="d-flex flex-wrap gap-2">
<button id="addToCart" class="btn btn-primary">Add to Cart</button>
<button id="buyNow" class="btn btn-success">Buy Now</button>
<button id="shareProduct" class="btn btn-outline-secondary">Share</button>
</div>

</div>

</div>

</main>

<!-- ==========================================================
DETAILS
========================================================== -->

<section class="container pb-5">

<ul class="nav nav-tabs">
<li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#description">Description</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#specifications">Specifications</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#downloads">Downloads</button></li>
</ul>

<div class="tab-content border border-top-0 p-4">

<div id="description" class="tab-pane fade show active"></div>

<div id="specifications" class="tab-pane fade"></div>

<div id="downloads" class="tab-pane fade"></div>

</div>

</section>

<!-- ==========================================================
RELATED PRODUCTS
========================================================== -->

<section class="bg-body-tertiary py-5">
<div class="container">
<div class="d-flex justify-content-between align-items-center mb-3">
<h2 class="h4 mb-0">Related Products</h2>
<a href="products.html" class="small text-decoration-none">View All</a>
</div>
<div id="relatedProducts" class="row g-3"></div>
</div>
</section>

<!-- ==========================================================
RELATED BLOGS
========================================================== -->

<section class="py-5">
<div class="container">
<div class="d-flex justify-content-between align-items-center mb-3">
<h2 class="h4 mb-0">Buying Guides</h2>
<a href="blogs.html" class="small text-decoration-none">View All</a>
</div>
<div id="relatedBlogs" class="row g-3"></div>
</div>
</section>

<!-- ==========================================================
FAQ
========================================================== -->

<section class="bg-body-tertiary py-5">
<div class="container">
<h2 class="h4 mb-4">Frequently Asked Questions</h2>
<div id="productFAQ"></div>
</div>
</section>

<footer id="siteFooter"></footer>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
